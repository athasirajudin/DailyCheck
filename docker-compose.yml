version: "3.9"

services:
  app:
    build:
      context: ./backend_laravel
      dockerfile: Dockerfile
    container_name: absensi-app
    env_file:
      - ./backend_laravel/.env
    volumes:
      - ./backend_laravel:/app
    depends_on:
      - db
      

  db:
    image: mysql:8.0
    container_name: absensi-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: absensi_pkl_1
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
      - ./backend/sql:/docker-entrypoint-initdb.d:ro

  nginx:
    image: nginx:1.25-alpine
    container_name: absensi-nginx
    depends_on:
      - app
    ports:
      - "8000:80"
    volumes:
      - ./backend_laravel:/app:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: absensi-phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
    ports:
      - "8081:80"

volumes:
  dbdata:
